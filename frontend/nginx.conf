server {
    listen 80;

    # serve the React static files from the dist folder
    root /usr/share/nginx/html;
    index index.html;

    # any URL the user visits (like /upload) should load index.html
    # React then handles the routing in the browser
    location / {
        try_files $uri $uri/ /index.html;
    }

    # forward any request starting with /api/ to the backend service
    # nginx strips the /api prefix before sending it to FastAPI
    location /api/ {
        proxy_pass http://pdm-backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
