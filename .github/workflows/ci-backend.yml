name: Backend CI

on:
  push:
    branches: ['**']
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  ECR_REGISTRY: 302954730632.dkr.ecr.us-east-1.amazonaws.com
  ECR_REPOSITORY: pdm-backend
  AWS_REGION: us-east-1

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint
        run: flake8 app/

      - name: Test
        run: pytest tests/ -v

  build-and-push:
    needs: lint-and-test
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v6

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: meta
        run: echo "tag=${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Build and push
        run: |
          IMAGE=$ECR_REGISTRY/$ECR_REPOSITORY:${{ steps.meta.outputs.tag }}
          docker build -t $IMAGE ./backend
          docker push $IMAGE
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            docker tag $IMAGE $ECR_REGISTRY/$ECR_REPOSITORY:latest
            docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          fi

  update-gitops:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Update image tag in GitOps repo
        env:
          GITOPS_PAT: ${{ secrets.GITOPS_PAT }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
        run: |
          git clone https://x-access-token:${GITOPS_PAT}@github.com/yoavmanoim-prog/pdm-gitops.git
          cd pdm-gitops
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            ENV=production
          else
            ENV=staging
          fi
          sed -i "s/tag: .*/tag: ${IMAGE_TAG}/" ${ENV}/backend/values.yaml
          git config user.email "ci@pdm"
          git config user.name "GitHub Actions"
          git commit -am "ci: update backend image to ${IMAGE_TAG}"
          git push

  notify-slack:
    needs: [lint-and-test, build-and-push]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Notify Slack on failure
        uses: slackapi/slack-github-action@v1.26.0
        with:
          slack-message: |
            :x: Build failed on *${{ github.repository }}*
            Branch: `${{ github.ref_name }}`
            Commit: `${{ github.sha }}`
            <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
