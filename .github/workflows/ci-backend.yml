name: Backend CI

on:
  push:
    branches: ['**']
    tags: ['v*']
    paths:
      - 'backend/**'            # only run when backend code changes
      - 'frontend/**'           # only run when frontend code changes
      - '.github/workflows/**'  # always run when CI config itself changes
  pull_request:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/**'

env:
  ECR_REGISTRY: 302954730632.dkr.ecr.us-east-1.amazonaws.com
  ECR_BACKEND: pdm-backend
  ECR_FRONTEND: pdm-frontend
  AWS_REGION: us-east-1

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      # cache pip downloads — skips re-downloading packages that haven't changed
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('backend/requirements.txt', 'backend/requirements-dev.txt') }}
          restore-keys: pip-

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint
        run: flake8 app/

      - name: Test
        run: pytest tests/ -v
        env:
          DATABASE_URL: "postgresql://test:test@localhost/test"
          S3_BUCKET: "test-bucket"

  build-and-push:
    needs: lint-and-test
    # only build on develop (staging) and version tags (production)
    if: github.ref == 'refs/heads/develop' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # needed for OIDC authentication with AWS
      contents: read
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v6

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: meta
        run: echo "tag=${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Build and push backend image
        run: |
          IMAGE=$ECR_REGISTRY/$ECR_BACKEND:${{ steps.meta.outputs.tag }}
          docker build \
            --platform linux/amd64 \
            --cache-from $ECR_REGISTRY/$ECR_BACKEND:latest \
            --build-arg BUILDKIT_INLINE_CACHE=1 \
            -t $IMAGE ./backend
          docker push $IMAGE

          # tag as latest on develop merges
          if [ "${{ github.ref }}" = "refs/heads/develop" ]; then
            docker tag $IMAGE $ECR_REGISTRY/$ECR_BACKEND:latest
            docker push $ECR_REGISTRY/$ECR_BACKEND:latest
          fi

          # on a production release (v* tag), also tag the image with the
          # version tag so the ECR image carries the release version (e.g.
          # v2.0.1), not just the commit SHA.
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            docker tag $IMAGE $ECR_REGISTRY/$ECR_BACKEND:${{ github.ref_name }}
            docker push $ECR_REGISTRY/$ECR_BACKEND:${{ github.ref_name }}
          fi

      # Only deploy the frontend to S3/CloudFront for production (v* tags).
      # Staging has no separate CloudFront distribution.
      - name: Build and deploy frontend to S3
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          BUCKET="pdm-frontend-production"

          # look up the CloudFront distribution that has this S3 bucket as any origin.
          # search all origins (not just index 0) because the ELB is often index 0.
          CF_ID=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?contains(to_string(Origins.Items[*].DomainName), '${BUCKET}.s3')].Id | [0]" \
            --output text)

          if [ -z "$CF_ID" ] || [ "$CF_ID" = "None" ]; then
            echo "ERROR: could not find CloudFront distribution for bucket $BUCKET"
            exit 1
          fi

          cd frontend
          npm ci
          npm run build
          aws s3 sync dist/ s3://$BUCKET --delete
          aws cloudfront create-invalidation --distribution-id $CF_ID --paths "/*"

  update-gitops:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Update backend image tag in GitOps repo
        env:
          GITOPS_PAT: ${{ secrets.GITOPS_PAT }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
        run: |
          git clone https://x-access-token:${GITOPS_PAT}@github.com/yoavmanoim-prog/pdm-gitops.git
          cd pdm-gitops
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            # production pins the human-readable release tag (e.g. v2.0.1). The
            # build-and-push job already pushed this tag to ECR alongside the SHA.
            ENV=production
            DEPLOY_TAG="${{ github.ref_name }}"
          else
            # staging tracks the commit SHA — there's no version tag on develop.
            ENV=staging
            DEPLOY_TAG="${IMAGE_TAG}"
          fi
          sed -i "s/tag: .*/tag: ${DEPLOY_TAG}/" ${ENV}/backend/values.yaml
          git config user.email "ci@pdm"
          git config user.name "GitHub Actions"
          git commit -am "ci: update backend image to ${DEPLOY_TAG}"
          git push

  # Post-deploy smoke test on staging. After the image tag is committed to the
  # GitOps repo, ArgoCD syncs it asynchronously, so we poll /health until the
  # deployment is serving. Runs only on develop (the staging branch), and only
  # if the STAGING_URL repo variable is set (Settings → Variables → Actions).
  smoke-test:
    needs: update-gitops
    if: github.ref == 'refs/heads/develop' && vars.STAGING_URL != ''
    runs-on: ubuntu-latest
    steps:
      - name: Smoke test staging /health
        env:
          STAGING_URL: ${{ vars.STAGING_URL }}
        run: |
          base="${STAGING_URL%/}"
          echo "Polling ${base}/health (ArgoCD syncs the new image asynchronously)…"
          for i in $(seq 1 30); do
            if body=$(curl -fsS --max-time 10 "${base}/health" 2>/dev/null) \
                 && echo "$body" | grep -q '"healthy"[[:space:]]*:[[:space:]]*true'; then
              echo "✓ staging healthy: $body"
              exit 0
            fi
            echo "attempt ${i}/30: not healthy yet, retrying in 10s…"
            sleep 10
          done
          echo "✗ staging did not report healthy within ~5 minutes"
          exit 1

  notify-slack:
    needs: [lint-and-test, build-and-push, smoke-test]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Notify Slack on failure
        uses: slackapi/slack-github-action@v2.1.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": ":x: Build failed on *${{ github.repository }}*\nBranch: `${{ github.ref_name }}`\nCommit: `${{ github.sha }}`\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"
            }
