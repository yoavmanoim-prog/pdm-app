services:

  # ── Local Vault ─────────────────────────────────────────────────────────────
  # Engineer's local workspace — commits go here first, then pushed to AWS
  local-vault:
    build: ./backend
    # migrate the local DB on start (same as remote-vault) so a new migration
    # never leaves local-db behind the code — that surfaces as 500s like
    # "column commit_files.approved_by does not exist".
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://pdm:pdm@local-db:5432/pdm
      VAULT_MODE: local
      # Push/Pull AND auth delegation target the local remote-vault below, so the
      # whole local<->remote flow (incl. shared users) works offline. Point this
      # back at the AWS vault (https://d3df2y18th5fg7.cloudfront.net/api) to use
      # the real remote instead.
      REMOTE_VAULT_URL: http://remote-vault:8000
      S3_BUCKET: "pdm-docs-production"
      AWS_REGION: us-east-1
      WATCH_BASE: /watch
      CORS_ORIGINS: "http://localhost:3000,http://localhost:5173"
    depends_on:
      local-db:
        condition: service_healthy
      remote-vault:
        condition: service_started
    volumes:
      - ./backend:/app
      - ~/.aws:/root/.aws:ro
      - ${HOME}:/watch:ro

  # ── Remote Vault ────────────────────────────────────────────────────────────
  # Local stand-in for the shared AWS vault. It owns the single user table, so
  # the local vault delegates login/signup/user-management here (shared users).
  # Runs DB migrations on start, then seeds the admin from backend/.env.
  remote-vault:
    build: ./backend
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8001:8000"
    environment:
      DATABASE_URL: postgresql://pdm:pdm@remote-db:5432/pdm
      VAULT_MODE: remote
      S3_BUCKET: "pdm-docs-production"
      AWS_REGION: us-east-1
      CORS_ORIGINS: "http://localhost:3000,http://localhost:5173"
    depends_on:
      remote-db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ~/.aws:/root/.aws:ro

  # ── Frontend ────────────────────────────────────────────────────────────────
  # React dev server — open http://localhost:5173
  frontend:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    environment:
      LOCAL_VAULT_URL: http://local-vault:8000
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - local-vault

  # ── Local Database ───────────────────────────────────────────────────────────
  local-db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: pdm
      POSTGRES_USER: pdm
      POSTGRES_PASSWORD: pdm
    volumes:
      - local-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pdm"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Remote Database ──────────────────────────────────────────────────────────
  # Backs the remote-vault — holds the shared user table (and remote-side repos).
  remote-db:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: pdm
      POSTGRES_USER: pdm
      POSTGRES_PASSWORD: pdm
    volumes:
      - remote-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pdm"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  local-db-data:
  remote-db-data:
  frontend_node_modules:
