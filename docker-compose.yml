services:

  # ── Local Vault ─────────────────────────────────────────────────────────────
  # Engineer's local workspace — commits go here first, then pushed to AWS
  local-vault:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://pdm:pdm@local-db:5432/pdm
      VAULT_MODE: local
      # Push/Pull go to the real remote vault running on AWS (EKS)
      REMOTE_VAULT_URL: https://d3df2y18th5fg7.cloudfront.net/api
      S3_BUCKET: "pdm-docs-production"
      AWS_REGION: us-east-1
      WATCH_BASE: /watch
      CORS_ORIGINS: "http://localhost:3000,http://localhost:5173"
    depends_on:
      local-db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ~/.aws:/root/.aws:ro
      - ${HOME}:/watch:ro

  # ── Frontend ────────────────────────────────────────────────────────────────
  # React dev server — open http://localhost:5173
  frontend:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    environment:
      LOCAL_VAULT_URL: http://local-vault:8000
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - local-vault

  # ── Local Database ───────────────────────────────────────────────────────────
  local-db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: pdm
      POSTGRES_USER: pdm
      POSTGRES_PASSWORD: pdm
    volumes:
      - local-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pdm"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  local-db-data:
  frontend_node_modules:
