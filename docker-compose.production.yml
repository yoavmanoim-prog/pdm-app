# Dev-against-PRODUCTION. Mirrors docker-compose.staging.yml but points at the
# real AWS PRODUCTION vault for auth (shared users) + push/pull — so you work
# locally with your production account against production data.
#
#   docker compose -f docker-compose.production.yml up
#   → open http://localhost:5173, log in with your PRODUCTION account
#
# Local Vault = your workspace on this machine. Remote Vault = production:
# in the UI set the remote vault URL to https://d3df2y18th5fg7.cloudfront.net
# (production CORS already allows http://localhost:5173, and your login token is
# a production token, so production accepts it).
#
# Separate project name so it never clashes with the dev/stage stacks (they all
# share host ports 8000/5173/5432) — don't run more than one at once.
name: pdm-prod-local

services:

  # ── Local Vault (your workstation) ──────────────────────────────────────────
  local-vault:
    build: ./backend
    # migrate the local DB on start, then serve (S3 storage, same as cloud).
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://pdm:pdm@local-db:5432/pdm
      VAULT_MODE: local
      # auth delegation + push/pull target AWS PRODUCTION (HTTPS, real cert via CloudFront)
      REMOTE_VAULT_URL: https://d3df2y18th5fg7.cloudfront.net/api
      S3_BUCKET: "pdm-docs-production"
      AWS_REGION: us-east-1
      WATCH_BASE: /watch
      CORS_ORIGINS: "https://d3df2y18th5fg7.cloudfront.net,http://localhost:3000,http://localhost:5173"
    depends_on:
      local-db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ~/.aws:/root/.aws:ro     # AWS creds for the production S3 bucket
      - ${HOME}:/watch:ro        # your filesystem, for the repo folder picker

  # ── Frontend (React dev server — open http://localhost:5173) ────────────────
  frontend:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    environment:
      LOCAL_VAULT_URL: http://local-vault:8000
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - local-vault

  # ── Local Database (this workstation's own vault DB) ────────────────────────
  local-db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: pdm
      POSTGRES_USER: pdm
      POSTGRES_PASSWORD: pdm
    volumes:
      - prod-local-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pdm"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  prod-local-db-data:
  frontend_node_modules:
