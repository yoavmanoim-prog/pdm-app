# ServiceMonitor tells the Prometheus operator to scrape /metrics on the backend service.
# The label "release: kube-prometheus-stack" must match the Prometheus selector
# so the operator picks this monitor up automatically.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: pdm-backend
  labels:
    app: pdm-backend
    release: kube-prometheus-stack   # must match prometheusSelector in the stack values
spec:
  selector:
    matchLabels:
      app: pdm-backend
  endpoints:
    - port: http
      path: /metrics        # endpoint prometheus-fastapi-instrumentator exposes
      interval: 15s
