# ServiceMonitor tells the Prometheus operator to scrape /metrics on this service.
# The label "release: kube-prometheus-stack" must match the Prometheus selector
# so the operator picks this monitor up automatically.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "backend.fullname" . }}
  labels:
    {{- include "backend.labels" . | nindent 4 }}
    release: kube-prometheus-stack   # must match prometheusSelector in the stack values
spec:
  selector:
    matchLabels:
      {{- include "backend.selectorLabels" . | nindent 6 }}
  endpoints:
    - port: http
      path: /metrics        # the endpoint prometheus-fastapi-instrumentator exposes
      interval: 15s         # scrape every 15 seconds
