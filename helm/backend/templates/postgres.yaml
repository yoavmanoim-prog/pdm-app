apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: pdm-postgres
spec:
  serviceName: pdm-postgres
  replicas: 1
  selector:
    matchLabels:
      app: pdm-postgres
  template:
    metadata:
      labels:
        app: pdm-postgres
    spec:
      containers:
        - name: postgres
          image: {{ .Values.postgres.image }}
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: {{ .Values.postgres.database }}
            - name: POSTGRES_USER
              value: {{ .Values.postgres.user }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: pdm-backend-secret
                  key: postgres-password
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", {{ .Values.postgres.user | quote }}]
            initialDelaySeconds: 5
            periodSeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.postgres.storage }}
---
apiVersion: v1
kind: Service
metadata:
  name: pdm-postgres
spec:
  selector:
    app: pdm-postgres
  ports:
    - port: 5432
      targetPort: 5432
  clusterIP: None
