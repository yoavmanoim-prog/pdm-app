apiVersion: apps/v1
kind: Deployment
metadata:
  name: pdm-backend
  labels:
    app: pdm-backend
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      app: pdm-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1  # kill 1 old pod before starting a new one
      maxSurge: 0        # never create extra pods — keeps total count stable
  template:
    metadata:
      labels:
        app: pdm-backend
    spec:
      serviceAccountName: pdm-backend
      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      {{- end }}
      initContainers:
        # runs alembic migrations before the backend starts
        # RDS is always available so no need to wait for it
        - name: migrate
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          command: ["sh", "-c", "cd /app && PYTHONPATH=/app alembic upgrade head"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: pdm-backend-secret
                  key: database-url
      containers:
        - name: backend
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: pdm-backend-secret
                  key: database-url
            - name: S3_BUCKET
              value: {{ .Values.aws.s3Bucket }}
            - name: AWS_REGION
              value: {{ .Values.aws.region }}
            - name: VAULT_MODE
              value: {{ .Values.vaultMode }}
            - name: CORS_ORIGINS
              value: {{ .Values.corsOrigins | quote }}
            {{- if .Values.auth.jwtSecretEnabled }}
            # signing key for login tokens — sourced from pdm-backend-secret
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: pdm-backend-secret
                  key: jwt-secret
            {{- end }}
            {{- if .Values.auth.bootstrapAdminEmail }}
            # seed the first admin on startup (remote vault only, idempotent)
            - name: BOOTSTRAP_ADMIN_EMAIL
              value: {{ .Values.auth.bootstrapAdminEmail | quote }}
            - name: BOOTSTRAP_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: pdm-backend-secret
                  key: bootstrap-admin-password
            {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "{{ .Values.resources.requests.cpu }}"
              memory: "{{ .Values.resources.requests.memory }}"
            limits:
              cpu: "{{ .Values.resources.limits.cpu }}"
              memory: "{{ .Values.resources.limits.memory }}"
