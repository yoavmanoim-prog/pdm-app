apiVersion: batch/v1
kind: Job
metadata:
  name: pdm-migrate-{{ .Values.image.tag | trunc 8 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "5"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  template:
    spec:
      serviceAccountName: pdm-backend
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-postgres
          image: busybox
          command:
            - sh
            - -c
            - |
              until nc -z pdm-postgres 5432; do
                echo "waiting for postgres..."; sleep 2
              done
      containers:
        - name: migrate
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          command: ["alembic", "upgrade", "head"]
          workingDir: /app
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: pdm-backend-secret
                  key: database-url
