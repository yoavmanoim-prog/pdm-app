{{- if .Values.externalSecrets.enabled }}
# When external secrets are enabled, the DB password is NOT in git. External
# Secrets Operator reads it from AWS Secrets Manager (via the ClusterSecretStore)
# and materializes the same `pdm-backend-secret` / `database-url` that the
# deployment, migrate-job, and init container consume — so nothing else changes.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: pdm-backend-secret
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.clusterSecretStore }}
    kind: ClusterSecretStore
  target:
    name: pdm-backend-secret
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        # built from the ESO-fetched password ({{ "{{ .password }}" }}) plus the
        # non-secret connection details, which stay in values.yaml
        database-url: "postgresql://{{ .Values.postgres.user }}:{{ "{{ .password }}" }}@{{ if .Values.rds.host }}{{ .Values.rds.host }}{{ else }}pdm-postgres{{ end }}:5432/{{ .Values.postgres.database }}"
        # auth secrets: from Secrets Manager when a *SecretName is configured,
        # otherwise the (blank) dev literal. Always present so the deployment's
        # secretKeyRefs resolve regardless of which knobs are set.
        jwt-secret: "{{ if .Values.externalSecrets.jwtSecretName }}{{ "{{ .jwt }}" }}{{ else }}{{ .Values.auth.jwtSecret }}{{ end }}"
        bootstrap-admin-password: "{{ if .Values.externalSecrets.bootstrapAdminPasswordSecretName }}{{ "{{ .bootstrapAdminPassword }}" }}{{ else }}{{ .Values.auth.bootstrapAdminPassword }}{{ end }}"
  data:
    - secretKey: password
      remoteRef:
        key: {{ .Values.externalSecrets.passwordSecretName }}
    {{- if .Values.externalSecrets.jwtSecretName }}
    - secretKey: jwt
      remoteRef:
        key: {{ .Values.externalSecrets.jwtSecretName }}
    {{- end }}
    {{- if .Values.externalSecrets.bootstrapAdminPasswordSecretName }}
    - secretKey: bootstrapAdminPassword
      remoteRef:
        key: {{ .Values.externalSecrets.bootstrapAdminPasswordSecretName }}
    {{- end }}
{{- end }}
