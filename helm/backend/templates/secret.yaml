{{- if not .Values.externalSecrets.enabled }}
# Fallback secret for environments WITHOUT External Secrets Operator (e.g. local
# dev / experiments): the password comes from values. In real clusters set
# externalSecrets.enabled=true so the password is sourced from Secrets Manager
# instead — see templates/externalsecret.yaml — and is never put in values/git.
apiVersion: v1
kind: Secret
metadata:
  name: pdm-backend-secret
type: Opaque
stringData:
  # DATABASE_URL points to RDS if rds.host is set, otherwise falls back to local postgres
  database-url: "postgresql://{{ .Values.postgres.user }}:{{ .Values.postgres.password }}@{{ if .Values.rds.host }}{{ .Values.rds.host }}{{ else }}pdm-postgres{{ end }}:5432/{{ .Values.postgres.database }}"
  # auth secrets (dev only here) — always present so the deployment's secretKeyRefs
  # resolve. Blank by default; the app keeps its own defaults / skips bootstrap.
  jwt-secret: {{ .Values.auth.jwtSecret | quote }}
  bootstrap-admin-password: {{ .Values.auth.bootstrapAdminPassword | quote }}
{{- end }}
