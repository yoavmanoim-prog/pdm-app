{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pdm-backend
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    # rewrite-target strips the /api/ prefix before forwarding to FastAPI.
    # without this, /api/repos/ reaches FastAPI as /api/repos/ which is a 404.
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          # /api/(.*)  →  FastAPI receives /$2 (e.g. /repos/, /repos/123/commit)
          - path: /api(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: pdm-backend
                port:
                  number: {{ .Values.service.port }}
          # everything else goes to the React frontend
          - path: /
            pathType: Prefix
            backend:
              service:
                name: pdm-frontend
                port:
                  number: 80
{{- end }}
