{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pdm-backend
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    # rewrite-target strips /api/ before forwarding to FastAPI.
    # e.g. CloudFront sends /api/repos → nginx forwards /repos to the pod.
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  ingressClassName: nginx
  rules:
    # When ingress.host is set (staging/dev nip.io names) the rule is host-scoped
    # so each environment is addressable on the shared ELB. Production leaves it
    # empty -> catch-all, because CloudFront forwards its own domain as the Host
    # header and would not match a specific host.
{{- if .Values.ingress.host }}
    - host: {{ .Values.ingress.host | quote }}
      http:
{{- else }}
    - http:
{{- end }}
        paths:
          # /api/(.*)  →  FastAPI receives /$2 (e.g. /repos/, /repos/123/commit)
          - path: /api(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: pdm-backend
                port:
                  number: {{ .Values.service.port }}
{{- end }}
