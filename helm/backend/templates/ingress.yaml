{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pdm-backend
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    # rewrite-target strips /api/ before forwarding to FastAPI.
    # e.g. CloudFront sends /api/repos → nginx forwards /repos to the pod.
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          # /api/(.*)  →  FastAPI receives /$2 (e.g. /repos/, /repos/123/commit)
          # No host filter — CloudFront sends requests with its own domain as Host.
          - path: /api(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: pdm-backend
                port:
                  number: {{ .Values.service.port }}
{{- end }}
