{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pdm-backend
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"   # allow large PDF uploads
spec:
  ingressClassName: nginx
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          # all traffic goes to the frontend nginx, which proxies /api/ to the
          # backend and strips the prefix (proxy_pass with trailing slash).
          # routing /api/ directly to the backend bypasses the strip and causes 404.
          - path: /
            pathType: Prefix
            backend:
              service:
                name: pdm-frontend
                port:
                  number: 80
{{- end }}
