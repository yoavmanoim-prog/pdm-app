replicaCount: 2

vaultMode: "remote"
corsOrigins: "http://localhost:3000,http://localhost:5173"

image:
  repository: 302954730632.dkr.ecr.us-east-1.amazonaws.com/pdm-backend
  tag: "latest"
  pullPolicy: Always

service:
  type: ClusterIP
  port: 8000

ingress:
  enabled: true
  # Empty = catch-all (no host filter). Production keeps this empty so CloudFront
  # (which sends its own domain as the Host header) still reaches it. Staging and
  # dev override this per-env with a nip.io host so they're individually
  # addressable on the shared ELB, e.g. staging.52.202.248.204.nip.io
  host: ""

resources:
  requests:
    cpu: "100m"
    memory: "256Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 8
  targetCPUUtilizationPercentage: 70

imagePullSecrets:
  - name: ecr-secret

aws:
  region: "us-east-1"
  s3Bucket: "pdm-docs-production"
  irsaRoleArn: "arn:aws:iam::302954730632:role/pdm-backend-production"

postgres:
  image: "postgres:16-alpine"
  database: "pdm"
  user: "pdm"
  # only used when externalSecrets.enabled=false (local dev / experiments).
  # In real clusters the password comes from Secrets Manager via ESO — see below.
  password: "changeme"
  storage: "5Gi"
  storageClass: "gp2"

# External Secrets Operator. When enabled, the DB password is read from AWS
# Secrets Manager and synced into pdm-backend-secret — it is never in values/git.
# Default off so the chart works without ESO; flip to true per-environment in the
# gitops values once ESO and the ClusterSecretStore are live.
externalSecrets:
  enabled: false
  clusterSecretStore: aws-secrets-manager
  passwordSecretName: pdm/backend/db-password
  # Optional extra secrets pulled from Secrets Manager into pdm-backend-secret.
  # Leave blank to source the value from values.auth.* instead (dev only). Set
  # these ONLY after the Secrets Manager entries exist, or ESO sync will error.
  jwtSecretName: ""                      # e.g. pdm/backend/jwt-secret
  bootstrapAdminPasswordSecretName: ""   # e.g. pdm/backend/bootstrap-admin-password
  refreshInterval: 1h

# Authentication (user pool). All off/blank by default so the chart is unchanged
# unless an environment opts in. Only meaningful on the remote (authority) vault.
auth:
  # set to seed the first admin on deploy. Idempotent: only the remote vault acts,
  # and only if no admin exists yet. Pairs with the password secret below.
  bootstrapAdminEmail: ""
  # mount JWT_SECRET (the token signing key) into the deployment. Turn on once the
  # secret is provided — via ESO (externalSecrets.jwtSecretName) in real clusters,
  # or auth.jwtSecret below for local/dev.
  jwtSecretEnabled: false
  # dev-only fallbacks, used when externalSecrets.enabled=false. In real clusters
  # these come from Secrets Manager via ESO — never put real secrets here.
  jwtSecret: ""
  bootstrapAdminPassword: ""

migrations:
  jobEnabled: false

# rds.host — when set, DATABASE_URL points to RDS instead of the local postgres pod
rds:
  host: ""

# frontend image — CI updates the tag alongside the backend
frontend:
  enabled: false  # frontend is served from S3/CloudFront, not Kubernetes
  repository: 302954730632.dkr.ecr.us-east-1.amazonaws.com/pdm-frontend
