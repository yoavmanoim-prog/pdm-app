replicaCount: 2

image:
  repository: 302954730632.dkr.ecr.us-east-1.amazonaws.com/pdm-backend
  tag: "latest"
  pullPolicy: Always

service:
  type: ClusterIP
  port: 8000

ingress:
  enabled: true
  host: pdm.example.com

resources:
  requests:
    cpu: "100m"
    memory: "256Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 8
  targetCPUUtilizationPercentage: 70

imagePullSecrets:
  - name: ecr-secret

aws:
  region: "us-east-1"
  s3Bucket: "pdm-docs-production"
  irsaRoleArn: "arn:aws:iam::302954730632:role/pdm-backend-production"

postgres:
  image: "postgres:16-alpine"
  database: "pdm"
  user: "pdm"
  password: "changeme"
  storage: "5Gi"
  storageClass: "gp2"

migrations:
  jobEnabled: false
